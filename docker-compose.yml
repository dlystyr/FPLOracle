services:
  postgres:
    image: postgres:18.1
    environment:
      POSTGRES_USER: fpl
      POSTGRES_PASSWORD: fpl
      POSTGRES_DB: fpl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpl"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8.4.0
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  fpl-oracle:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://fpl:fpl@postgres:5432/fpl
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
